
server.port=8081
# #  Database (from env) 
# spring.datasource.url=jdbc:postgresql://localhost:5432/sociallens
# spring.datasource.username=sociallens
# spring.datasource.password=sociallens
# spring.datasource.driver-class-name=org.postgresql.Driver


# enable jobs globally
sociallens.jobs.enabled=true

# run every minute (for testing)
sociallens.jobs.daily-refresh.cron=0 */1 * * * *
sociallens.jobs.oauth-refresh.cron=30 */1 * * * *
sociallens.jobs.oauth-refresh.enabled=true


#  JPA 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --------- OAuth / APIs (from env) ---------
youtube.api.key=${YOUTUBE_API_KEY}

# OAuth via env (no secrets in files)
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI}

logging.level.org.springframework.scheduling=INFO
logging.level.com.LogicGraph.sociallens.jobs=INFO



# Daily refresh (public)
sociallens.jobs.daily-refresh.enabled=true
sociallens.jobs.daily-refresh.cron=0 30 2 * * *     
sociallens.jobs.daily-refresh.max-channels-per-run=25
sociallens.jobs.daily-refresh.max-api-calls-per-run=500
sociallens.jobs.daily-refresh.video-snapshot-top-n=50

# OAuth refresh (analytics)
sociallens.jobs.oauth-refresh.enabled=true
sociallens.jobs.oauth-refresh.cron=0 0 3 * * *     
sociallens.jobs.oauth-refresh.max-accounts-per-run=200
sociallens.jobs.daily-refresh.max-videos-per-channel-per-run=2000

spring.task.scheduling.time-zone=UTC
