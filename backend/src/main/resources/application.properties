# Changelog: Normalized job property keys and removed duplicate/unused entries.
server.port=${SERVER_PORT:8081}

# CORS: production-safe origin patterns (no wildcard ports)
cors.allowed-origin-patterns=http://localhost:5173,http://localhost:5174

# API keys come from env 
youtube.api.key=${YOUTUBE_API_KEY}
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI}

# Flyway  -  disabled by default; enabled explicitly in each profile that uses PostgreSQL.
# Without this, Spring Boot auto-configures Flyway against any available datasource
# (including the H2 fallback), which fails because V1__baseline.sql uses PostgreSQL syntax.
spring.flyway.enabled=false

# JPA general  -  schema managed exclusively by Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Datasource must be provided by the active profile (local) or environment variables (prod).
# Run with: --spring.profiles.active=local (see application-local.properties)

logging.level.org.springframework.boot.context.config=DEBUG

spring.task.scheduling.time-zone=UTC

# Job toggles and guardrails
sociallens.jobs.enabled=false
sociallens.jobs.max-channels-per-run=25
sociallens.jobs.max-api-calls-per-run=400

# Daily refresh (prod-like default)
sociallens.jobs.daily-refresh.enabled=false
sociallens.jobs.daily-refresh.cron=0 30 2 * * *
sociallens.jobs.daily-refresh.max-channels-per-run=25
sociallens.jobs.daily-refresh.max-api-calls-per-run=500
sociallens.jobs.daily-refresh.max-videos-per-channel-per-run=400

# OAuth refresh (optional)
sociallens.jobs.oauth-refresh.enabled=false
sociallens.jobs.oauth-refresh.cron=0 0 */6 * * *
sociallens.jobs.oauth-refresh.max-accounts-per-run=200

# YouTube OAuth credentials (set via environment or local properties)
youtube.oauth.client-id=
youtube.oauth.client-secret=
youtube.oauth.redirect-uri=

# App-level settings
app.cors.allowed-origins=http://localhost:5173
app.base-url=http://localhost:8080
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.api.daily-quota=10000

