spring.main.allow-bean-definition-overriding=true

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tests use Hibernate schema generation; Flyway must be disabled for H2 in-memory.
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false

youtube.api.key=test-key
google.oauth.client-id=test-client-id
google.oauth.client-secret=test-secret
google.oauth.redirect-uri=http://localhost:8081/api/v1/oauth/youtube/callback
