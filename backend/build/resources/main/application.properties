server.port=8081

# API keys come from env 
youtube.api.key=${YOUTUBE_API_KEY}
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI}

# JPA general (safe)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.url=jdbc:h2:file:./data/sociallens;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.org.springframework.boot.context.config=DEBUG

sociallens.jobs.enabled=false

# daily refresh (prod-like default)
sociallens.jobs.daily-refresh.cron=0 15 3 * * *

# oauth refresh (optional)
sociallens.jobs.oauth-refresh.cron=0 0 */6 * * *
sociallens.jobs.oauth-refresh.enabled=true

# quota strategy guardrails
sociallens.jobs.max-channels-per-run=25
sociallens.jobs.max-api-calls-per-run=400



