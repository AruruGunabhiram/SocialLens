services:
  db:
    image: postgres:16
    container_name: sociallens-postgres
    environment:
      POSTGRES_DB: sociallens
      POSTGRES_USER: sociallens
      POSTGRES_PASSWORD: sociallens
    ports:
      - "5432:5432"
    volumes:
      - sociallens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sociallens -d sociallens"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    container_name: sociallens-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      # Datasource — points at the db service on the compose network
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sociallens
      SPRING_DATASOURCE_USERNAME: sociallens
      SPRING_DATASOURCE_PASSWORD: sociallens
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # Schema management
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      # YouTube / Google OAuth — required; provide via a .env file or shell exports
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8081/api/v1/oauth/youtube/callback}
      # Admin API key (used by ApiKeyAuthFilter on /api/v1/jobs/**, /api/v1/connected-accounts/**)
      SOCIALLENS_ADMIN_API_KEY: ${SOCIALLENS_ADMIN_API_KEY:-changeme}
      # Frontend origin allowed by CORS
      FRONTEND_URL: http://localhost:80

  frontend:
    build: ./frontend
    container_name: sociallens-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  sociallens_pgdata:
