openapi: 3.0.3

info:
  title: SocialLens API
  description: |
    YouTube analytics platform  -  channel metrics, timeseries, video data, OAuth, and jobs.

    **Live interactive docs:** http://localhost:8081/swagger-ui.html (auto-generated by springdoc-openapi)

    > **Note:** This file is manually maintained and reflects the controller signatures
    > as of the last backend audit. If the two diverge, springdoc is authoritative.
  version: "1.0.0"

servers:
  - url: http://localhost:8081
    description: Local development

tags:
  - name: channels
    description: Tracked YouTube channels
  - name: analytics
    description: Snapshot-based channel analytics (public metrics)
  - name: oauth
    description: Google OAuth 2.0 flow for private analytics
  - name: jobs
    description: Manual job triggers
  - name: youtube
    description: YouTube Data API proxy / channel sync
  - name: creator
    description: Creator intelligence (retention diagnosis)
  - name: connected-accounts
    description: OAuth connection status
  - name: yt-analytics
    description: Private YouTube Analytics API (requires OAuth)
  - name: health

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------

  /health:
    get:
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  # ---------------------------------------------------------------------------
  # Channels
  # ---------------------------------------------------------------------------

  /channels:
    get:
      tags: [channels]
      summary: List all tracked channels
      parameters:
        - name: includeInactive
          in: query
          schema:
            type: boolean
            default: false
          description: Include channels with no recent successful refresh
      responses:
        "200":
          description: Array of channel list items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelListItem"

  /channels/{channelDbId}:
    get:
      tags: [channels]
      summary: Channel detail
      parameters:
        - name: channelDbId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Full channel detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /channels/{channelDbId}/videos:
    get:
      tags: [channels]
      summary: Paginated video list for a channel
      parameters:
        - name: channelDbId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: q
          in: query
          schema:
            type: string
          description: Title search (blank = all)
        - name: sort
          in: query
          schema:
            type: string
            enum: [publishedAt, views, likes, comments, title]
            default: publishedAt
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Page of videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideosPageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Analytics  -  identifier-based
  # ---------------------------------------------------------------------------

  /analytics/channel:
    get:
      tags: [analytics]
      summary: Current channel metrics (by identifier)
      parameters:
        - name: identifier
          in: query
          required: true
          schema:
            type: string
          description: YouTube channel ID (UCxxx), handle (@name), or custom URL
      responses:
        "200":
          description: Latest snapshot metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelAnalytics"
        "404":
          $ref: "#/components/responses/NotFound"

  /analytics/timeseries:
    get:
      tags: [analytics]
      summary: Timeseries data (by identifier)
      parameters:
        - name: identifier
          in: query
          required: true
          schema:
            type: string
        - name: metric
          in: query
          required: true
          schema:
            type: string
            enum: [VIEWS, SUBSCRIBERS, UPLOADS]
      responses:
        "200":
          description: Timeseries response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeSeriesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /analytics/videos:
    get:
      tags: [analytics]
      summary: Top videos by view count (by identifier)
      parameters:
        - name: identifier
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Top videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopVideos"

  /analytics/upload-frequency:
    get:
      tags: [analytics]
      summary: Upload frequency breakdown (by identifier)
      parameters:
        - name: identifier
          in: query
          required: true
          schema:
            type: string
        - name: weeks
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 104
            default: 12
      responses:
        "200":
          description: Upload frequency data

  # ---------------------------------------------------------------------------
  # Analytics  -  channelDbId-based (preferred)
  # ---------------------------------------------------------------------------

  /analytics/channel/by-id:
    get:
      tags: [analytics]
      summary: Current channel metrics (by DB id)
      parameters:
        - name: channelDbId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Latest snapshot metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelAnalytics"
        "404":
          $ref: "#/components/responses/NotFound"

  /analytics/timeseries/by-id:
    get:
      tags: [analytics]
      summary: Timeseries data (by DB id)
      parameters:
        - name: channelDbId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: metric
          in: query
          required: true
          schema:
            type: string
            enum: [VIEWS, SUBSCRIBERS, UPLOADS]
        - name: rangeDays
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: |
            Number of days to include. Range = today − (rangeDays − 1) so that
            today is always the last point.
      responses:
        "200":
          description: Timeseries response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeSeriesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /analytics/videos/by-id:
    get:
      tags: [analytics]
      summary: Top videos (by DB id)
      parameters:
        - name: channelDbId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Top videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopVideos"

  /analytics/upload-frequency/by-id:
    get:
      tags: [analytics]
      summary: Upload frequency breakdown (by DB id)
      parameters:
        - name: channelDbId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: weeks
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 104
            default: 12
      responses:
        "200":
          description: Upload frequency data

  # ---------------------------------------------------------------------------
  # OAuth
  # ---------------------------------------------------------------------------

  /api/v1/oauth/youtube/start:
    get:
      tags: [oauth]
      summary: Start Google OAuth flow
      description: Returns the Google consent URL. Redirect the user's browser to this URL.
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OAuth start URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  authUrl:
                    type: string
                    example: "https://accounts.google.com/o/oauth2/v2/auth?..."

  /api/v1/oauth/youtube/callback:
    get:
      tags: [oauth]
      summary: OAuth callback (Google redirects here)
      description: |
        Exchange the authorization code for tokens, verify the state parameter,
        fetch the channel ID, and persist tokens. This endpoint is called by
        Google  -  do not call it directly.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OAuth connection successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  # ---------------------------------------------------------------------------
  # Jobs
  # ---------------------------------------------------------------------------

  /api/v1/jobs/refresh/channel:
    post:
      tags: [jobs]
      summary: Trigger manual channel refresh
      parameters:
        - name: channelDbId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Refresh triggered
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Refresh already in progress for this channel

  /api/v1/jobs/daily-refresh/run:
    post:
      tags: [jobs]
      summary: Trigger full daily refresh job manually
      description: Runs the same job as the scheduled 3:15 AM cron. Use with caution  -  consumes API quota.
      responses:
        "200":
          description: Job started

  # ---------------------------------------------------------------------------
  # YouTube  -  channel sync / lookup
  # ---------------------------------------------------------------------------

  /api/v1/youtube/sync:
    post:
      tags: [youtube]
      summary: Add or re-sync a channel by identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier]
              properties:
                identifier:
                  type: string
                  description: YouTube channel ID, handle (@name), or custom URL
                  example: "@mkbhd"
      responses:
        "200":
          description: Channel synced
        "429":
          description: YouTube API quota exceeded

  /youtube/channel/{identifier}:
    get:
      tags: [youtube]
      summary: Look up raw channel data from YouTube API (path param)
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Channel data from YouTube API

  /youtube/channel:
    get:
      tags: [youtube]
      summary: Look up raw channel data from YouTube API (query param)
      parameters:
        - name: identifier
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Channel data from YouTube API

  # ---------------------------------------------------------------------------
  # Creator Intelligence
  # ---------------------------------------------------------------------------

  /creator/retention/diagnosis:
    post:
      tags: [creator]
      summary: Audience retention drop diagnosis for a video
      description: |
        Fetches the audience retention curve from YouTube Analytics API (requires
        OAuth with `yt-analytics.readonly` scope) and returns detected drop events
        with severity classification and recommendations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionDiagnosisRequest"
      responses:
        "200":
          description: Diagnosis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionDiagnosisResponse"
        "401":
          description: Token refresh failed  -  reconnect OAuth
        "404":
          description: No connected YouTube account for this userId
        "502":
          description: YouTube Analytics API returned an error

  # ---------------------------------------------------------------------------
  # Connected Accounts
  # ---------------------------------------------------------------------------

  /api/v1/connected-accounts/status:
    get:
      tags: [connected-accounts]
      summary: Check OAuth connection status
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: platform
          in: query
          required: true
          schema:
            type: string
            enum: [YOUTUBE]
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean

  # ---------------------------------------------------------------------------
  # Private YouTube Analytics
  # ---------------------------------------------------------------------------

  /api/v1/yt-analytics/summary:
    get:
      tags: [yt-analytics]
      summary: Private analytics summary (requires OAuth)
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: days
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: Number of days to look back
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YtAnalyticsSummary"
        "401":
          description: Token refresh failed
        "502":
          description: YouTube Analytics API error

# =============================================================================
# Components
# =============================================================================

components:
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
          example: NOT_FOUND
        timestamp:
          type: string
          format: date-time
        details:
          type: object
          additionalProperties: true

    ChannelListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        channelId:
          type: string
        title:
          type: string
        thumbnailUrl:
          type: string
        subscriberCount:
          type: integer
          format: int64
        lastRefreshStatus:
          type: string
          enum: [NEVER_RUN, IN_PROGRESS, SUCCESS, FAILED]

    ChannelDetail:
      allOf:
        - $ref: "#/components/schemas/ChannelListItem"
        - type: object
          properties:
            description:
              type: string
            customUrl:
              type: string
            viewCount:
              type: integer
              format: int64
            videoCount:
              type: integer
            publishedAt:
              type: string
              format: date-time
            lastSuccessfulRefreshAt:
              type: string
              format: date-time

    ChannelAnalytics:
      type: object
      properties:
        channelDbId:
          type: integer
          format: int64
        channelId:
          type: string
        subscriberCount:
          type: integer
          format: int64
        viewCount:
          type: integer
          format: int64
        videoCount:
          type: integer
        capturedAt:
          type: string
          format: date-time

    TimeSeriesResponse:
      type: object
      properties:
        channelDbId:
          type: integer
          format: int64
        channelId:
          type: string
        metric:
          type: string
          enum: [VIEWS, SUBSCRIBERS, UPLOADS]
        rangeDays:
          type: integer
        points:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                example: "2025-03-01"
              value:
                type: integer
                format: int64

    TopVideos:
      type: object
      properties:
        channelDbId:
          type: integer
          format: int64
        videos:
          type: array
          items:
            type: object
            properties:
              videoId:
                type: string
              title:
                type: string
              viewCount:
                type: integer
                format: int64
              likeCount:
                type: integer
              commentCount:
                type: integer
              publishedAt:
                type: string
                format: date-time

    VideosPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
            properties:
              videoId:
                type: string
              title:
                type: string
              viewCount:
                type: integer
                format: int64
              likeCount:
                type: integer
              commentCount:
                type: integer
              publishedAt:
                type: string
                format: date-time
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    RetentionDiagnosisRequest:
      type: object
      required: [userId, videoId]
      properties:
        userId:
          type: integer
          format: int64
        videoId:
          type: string
          description: YouTube video ID
          example: "dQw4w9WgXcQ"
        startDate:
          type: string
          format: date
          description: Defaults to 28 days ago
        endDate:
          type: string
          format: date
          description: Defaults to today

    RetentionDiagnosisResponse:
      type: object
      properties:
        videoId:
          type: string
        summary:
          type: string
        dropEvents:
          type: array
          items:
            type: object
            properties:
              startProgress:
                type: number
                format: double
                description: Fraction of video (0.0–1.0)
              endProgress:
                type: number
                format: double
              dropMagnitude:
                type: number
                format: double
                description: Watch ratio drop (0.08 = 8%)
              slope:
                type: number
                format: double
              severity:
                type: string
                enum: [LOW, MEDIUM, HIGH]
        diagnoses:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
                enum:
                  [
                    HOOK_WEAK_OR_MISMATCH,
                    PACING_OR_TOPIC_SHIFT,
                    OUTRO_TOO_LONG,
                    STRUCTURE_DIP,
                  ]
              severity:
                type: string
                enum: [LOW, MEDIUM, HIGH]
              evidence:
                type: string
              recommendation:
                type: string

    YtAnalyticsSummary:
      type: object
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        views:
          type: integer
          format: int64
        estimatedMinutesWatched:
          type: integer
          format: int64
        averageViewDurationSeconds:
          type: integer
          format: int64
        subscribersGained:
          type: integer
          format: int64
        subscribersLost:
          type: integer
          format: int64
        netSubscribers:
          type: integer
          format: int64
